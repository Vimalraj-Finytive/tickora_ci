<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Invoice</title>
    <style>
        body {
            font-family: "Helvetica", Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #fff;
            color: #333;
        }

        th {
            font-family: "Helvetica", Arial, sans-serif;
            font-weight: bold;
        }

        .invoice-box {
            max-width: 800px;
            margin: auto;
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #000;
            padding-bottom: 5px;
        }

        .logo {
            width: 60px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-family: 'Georgia', serif;
            margin: 30px 0 10px 0;
        }

        .info {
            margin-top: 30px;
        }

        .info p {
            margin: 4px 0;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        th, td {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th { background-color: #f3f3f3; font-weight: bold; }

        .total { text-align: right; font-size: 16px; font-weight: bold; margin-top: 10px; }

        .payment, .note {
            margin-top: 20px;
            font-size: 14px;
        }

        .member, .note {
            margin-top: 20px;
            font-size: 14px;
        }

        .header-title{margin-top: 20px; font-size: 8px;}
    </style>
</head>
<body>
<div class="invoice-box">
    <div style="width: 100%; display: table; margin-bottom: 20px; vertical-align: middle;">

        <div style="display: table-cell; vertical-align: middle; width: 150px;">
            <img src="{{logo}}" alt="Tickora" style="width: 120px; height: auto; display: block;" />
        </div>

        <div style="display: table-cell; text-align: right; vertical-align: middle;">
            <p style="margin: 0; font-size: 14px;"><strong>Date:</strong> {{invoiceDate}}</p>
<!--            <p style="margin: 0; font-size: 14px;"><strong>Invoice No:</strong> {{invoiceId}}</p>-->
        </div>
    </div>

    <hr>
    <div class="title">ACKNOWLEDGEMENT RECEIPT</div>

    <div class="info">
        <p><strong>Billed to:</strong></p>
        <p>{{orgName}}</p>
        <p>{{email}}</p>
        <p>{{contact}}</p>
    </div>

    <table>
        <thead>
        <tr>
            <th>Subscription</th>
            <th>Paid At</th>
            <th>Billing Cycle</th>
            <th>Amount</th>
        </tr>
        </thead>
        <tbody>
        {{paymentRows}}
        </tbody>
    </table>

    <div class="total">Total: ₹ {{totalAmount}}</div>

    <div class="member">
        <p><strong>Total Members:</strong> {{subscribedUser}}</p>
    </div>

    <div class="payment">
        <p><strong>Payment method:</strong> {{method}}</p>
    </div>

    <div class="note">
        <p><strong>Status:</strong> {{paymentStatus}} </p>
    </div>

    <div style="margin-top: 30px; text-align: center;">
        <img src="{{footerImage}}" alt="Footer" style="width: 100%; height: auto; display: block;" />
    </div>

</div>
</body>
</html>
