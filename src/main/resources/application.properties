# Maximum number of connections in the pool
spring.datasource.hikari.maximum-pool-size=20

# Minimum number of idle connections to maintain in the pool
spring.datasource.hikari.minimum-idle=10

# Maximum number of idle connections allowed in the pool
spring.datasource.hikari.idle-timeout=300000  # 5 minutes

# Maximum lifetime of a connection (after this time, the connection will be closed)
spring.datasource.hikari.max-lifetime=1800000  # 30 minutes

# Timeout for establishing a connection from the pool
spring.datasource.hikari.connection-timeout=30000  # 30 seconds

# Leak detection threshold (for detecting leaked connections)
spring.datasource.hikari.leak-detection-threshold=2000  # 2 seconds (optional)

# Enable auto-commit (turn it off if using transactions)
spring.datasource.hikari.auto-commit=true




