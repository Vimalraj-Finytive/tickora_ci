spring.servlet.multipart.resolve-lazily=false

#Added for connection
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=HerokuHikariPool
java.net.preferIPv4Stack=true
server.forward-headers-strategy=framework
spring.cache.type=caffeine

#Files Folder
csv.download.dir = ${user.dir}/uploads/temp/report/
csv.upload.dir = ${user.dir}/uploads/temp/bulkUser/

#JWT config
app.api.key = ${jwt.secret}
spring.redis.notify-keyspace-events=Ex

#Redis config
cache.redis.enabled=${REDIS_ENABLED}
app.redis.url=${REDISCLOUD_URL}

# Redis keys prefix
cache.keys.roleprivilege=roleprivilege
cache.keys.location=location
cache.keys.users=users
cache.keys.groups=groups
cache.keys.userprofile=userProfile
cache.keys.workSchedule=workSchedule
cache.keys.inactiveUsers=inactiveUsers

#Redis Cache Key With Other Cache Dependency Mapping
cache.dependency.users=userProfile,groups,inactiveUsers
cache.dependency.groups=users,userProfile
cache.dependency.location=users,groups,userProfile
cache.dependency.workSchedule=users,groups,userProfile
cache.dependency.inactiveUsers=groups,users

#Redis OTP
otp.ttl.minutes=1
otp.max.daily.attempts=2
otp.test=${TEST_OTP}
otp.test.mobile=${TEST_MOBILE}
cache.keys.otpCount=otpCount
cache.keys.otpKey=otpKey

