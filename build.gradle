plugins {
	id 'java'
	id 'org.springframework.boot' version '3.3.4'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.uniq.tms.tms_microservice'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
    configureEach {
		exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'

		resolutionStrategy {
			force 'org.apache.commons:commons-lang3:3.18.0'
			force 'commons-beanutils:commons-beanutils:1.11.0'
		}
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.boot:spring-boot-starter-mail'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'
	implementation 'org.mapstruct:mapstruct:1.5.5.Final'
	annotationProcessor 'org.mapstruct:mapstruct-processor:1.5.5.Final'
	implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
	implementation 'org.postgresql:postgresql'
	implementation 'jakarta.validation:jakarta.validation-api:3.0.2'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.apache.poi:poi-ooxml:5.4.0'
	implementation 'org.springframework.boot:spring-boot-starter-log4j2'
	implementation 'org.springframework.boot:spring-boot-starter-cache'
	implementation 'com.github.ben-manes.caffeine:caffeine'
	implementation 'org.apache.commons:commons-lang3:3.18.0'
	implementation 'com.opencsv:opencsv:5.10'
	implementation 'commons-io:commons-io:2.14.0'
	implementation 'org.springframework.boot:spring-boot-starter-data-redis'
	implementation 'redis.clients:jedis:5.1.0'
	implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
	implementation 'com.fasterxml.jackson.core:jackson-databind'
	implementation 'com.fasterxml.jackson.core:jackson-core'
	implementation 'org.liquibase:liquibase-core'
	implementation 'com.zaxxer:HikariCP'
	implementation 'org.hibernate.orm:hibernate-core:6.4.4.Final'
	implementation 'com.razorpay:razorpay-java:1.4.5'
	implementation 'com.itextpdf:kernel:8.0.2'
	implementation 'com.itextpdf:layout:8.0.2'
	implementation 'com.itextpdf:html2pdf:5.0.2'
	implementation "org.springdoc:springdoc-openapi-starter-webmvc-ui:2.5.0"
	implementation 'commons-beanutils:commons-beanutils:1.11.0'
}


tasks.named('test') {
	useJUnitPlatform()
}

bootJar {
	archiveFileName = 'tickora-production.jar'
}

jar {
	enabled = false
}